<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Teacher QR Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 50px;
    }

    input, select, button {
      width: 80%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      font-size: 16px;
    }

    button {
      background: #667eea;
      color: white;
      cursor: pointer;
      transition: transform 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    #qrcode {
      margin-top: 20px;
    }
  </style>
  <!-- QR Library -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.0/build/qrcode.min.js"></script>
</head>
<body>
  <h1>Generate QR for Attendance</h1>

  <input type="text" id="subject" placeholder="Subject">
  <input type="text" id="duration" placeholder="Duration (e.g., 60 mins)">
  <button id="generateQRBtn">Generate QR</button>

  <div id="qrcode"></div>

  <script>
  document.getElementById('generateQRBtn').addEventListener('click', async () => {
  const subject = document.getElementById('subject').value;
  const duration = document.getElementById('duration').value;

  if (!subject || !duration) {
    alert("Please fill both fields");
    return;
  }

  try {
    // Get teacher's location
    const position = await getLocation();
    const teacherLat = position.coords.latitude;
    const teacherLon = position.coords.longitude;

    // Create data object
    const qrData = {
      subject: subject,
      duration: duration,
      teacherLat: teacherLat,
      teacherLon: teacherLon
    };

    // Convert data to JSON string
    const qrDataString = JSON.stringify(qrData);

    // Clear previous QR
    document.getElementById('qrcode').innerHTML = "";

    // Generate QR
    QRCode.toCanvas(qrDataString, function (error, canvas) {
      if (error) {
        console.error(error);
        alert("QR generation failed ❌");
      } else {
        document.getElementById('qrcode').appendChild(canvas);
        alert("QR Generated ✅");
      }
    });

  } catch (error) {
    alert("Location permission required ❌");
  }
});

// ✅ OUTSIDE (IMPORTANT)
function getLocation() {
  return new Promise((resolve, reject) => {
    navigator.geolocation.getCurrentPosition(
      position => resolve(position),
      error => reject(error)
    );
  });
}
  </script>
</body>
</html>
