<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Teacher Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f6f9;
    }

    /* 🔵 Sidebar */
    .sidebar {
      position: fixed;
      width: 220px;
      height: 100%;
      background: #764ba2;
      padding: 20px;
      color: white;
    }

    .sidebar h2 {
      text-align: center;
      margin-bottom: 30px;
    }

    .sidebar button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      background: white;
      color: #764ba2;
      cursor: pointer;
      font-weight: bold;
    }

    .sidebar button:hover {
      background: #ddd;
    }

    /* 🔵 Main */
    .main {
      margin-left: 240px;
      padding: 40px;
      text-align: center;
    }

    input {
      width: 300px;
      padding: 12px;
      margin: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .generate {
      background: #764ba2;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }

    #qrcode {
      margin-top: 20px;
    }
  </style>

  <!-- QR Library -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.0/build/qrcode.min.js"></script>

</head>

<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>Teacher</h2>
    <button onclick="goToGenerateQR()">🔳 Generate QR</button>
    <button onclick="goToAttendance()">📊 Attendance</button>
    <button onclick="logout()">🚪 Logout</button>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">

    <h1>Generate QR for Attendance</h1>

    <input type="text" id="subject" placeholder="Subject">
    <input type="text" id="duration" placeholder="Duration (e.g., 60 mins)">
    <br>

    <button class="generate" id="generateQRBtn">Generate QR</button>

    <div id="qrcode"></div>

  </div>

  <script>
    // NAVIGATION
    // 🧭 TEACHER NAVIGATION

window.goToGenerateQR = function () {
  window.location.href = "teacher.html";
};

window.goToAttendance = function () {
  window.location.href = "attendance.html";
};

window.logout = function () {
  window.location.href = "index.html";
};

    // 📍 LOCATION FUNCTION
    function getLocation() {
      return new Promise((resolve, reject) => {
        navigator.geolocation.getCurrentPosition(resolve, reject);
      });
    }

    // 🔳 GENERATE QR
    document.getElementById('generateQRBtn').addEventListener('click', async () => {

      const subject = document.getElementById('subject').value;
      const duration = document.getElementById('duration').value;

      if (!subject || !duration) {
        alert("Please fill both fields ❌");
        return;
      }

      try {
        const position = await getLocation();

        const teacherLat = position.coords.latitude;
        const teacherLon = position.coords.longitude;

        const qrData = {
          subject: subject,
          duration: duration,
          teacherLat: teacherLat,
          teacherLon: teacherLon
        };

        const qrDataString = JSON.stringify(qrData);

        document.getElementById('qrcode').innerHTML = "";

        QRCode.toCanvas(qrDataString, function (error, canvas) {
          if (error) {
            console.error(error);
            alert("QR generation failed ❌");
          } else {
            document.getElementById('qrcode').appendChild(canvas);
          }
        });

      } catch (error) {
        alert("Location permission required ❌");
      }
    });
  </script>

</body>
</html>
