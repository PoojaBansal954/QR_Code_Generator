<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Teacher Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    #qrCode {
      margin-top: 20px;
    }
  </style>

  <!-- 🔥 QR CODE LIBRARY -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.0/build/qrcode.min.js"></script>

</head>

<body>

  <div class="card">
    <h2>Generate QR</h2>

    <input type="text" id="subject" placeholder="Subject">
    <input type="text" id="duration" placeholder="Duration (e.g. 1 hour)">

    <button id="generateBtn">Generate QR</button>

    <div id="qrCode"></div>
  </div>

  <script>
    document.getElementById("generateBtn").addEventListener("click", () => {

      const subject = document.getElementById("subject").value;
      const duration = document.getElementById("duration").value;

      if (!subject || !duration) {
        alert("Please fill all fields");
        return;
      }

      // 🔥 Create data for QR
      const data = JSON.stringify({
        subject: subject,
        duration: duration,
        time: new Date().toLocaleString()
      });

      // 🔥 Clear old QR
      document.getElementById("qrCode").innerHTML = "";

      // 🔥 Generate QR
      QRCode.toCanvas(data, function (error, canvas) {
        if (error) {
          console.error(error);
          alert("Error generating QR");
        } else {
          document.getElementById("qrCode").appendChild(canvas);
        }
      });

    });
  </script>

</body>

</html>
