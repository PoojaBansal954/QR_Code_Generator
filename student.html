<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Student Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f6f9;
    }

    /* 🔵 Sidebar */
    .sidebar {
      position: fixed;
      width: 220px;
      height: 100%;
      background: #667eea;
      padding: 20px;
      color: white;
    }

    .sidebar h2 {
      text-align: center;
      margin-bottom: 30px;
    }

    .sidebar button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      background: white;
      color: #667eea;
      cursor: pointer;
      font-weight: bold;
    }

    .sidebar button:hover {
      background: #ddd;
    }

    /* 🔵 Main Content */
    .main {
      margin-left: 240px;
      padding: 20px;
      text-align: center;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    #reader {
      width: 300px;
      margin: auto;
      margin-top: 20px;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    #status {
      margin-top: 15px;
      font-size: 16px;
      padding: 10px;
      border-radius: 8px;
      background: #667eea;
      color: white;
    }

    .result-card {
      margin-top: 20px;
      background: white;
      color: #333;
      padding: 20px;
      border-radius: 15px;
      width: 320px;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }
  </style>

  <!-- QR SCANNER -->
  <script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

  <!-- 🔥 SIDEBAR -->
  <div class="sidebar">
    <h2>Student</h2>
    <button onclick="goToScan()">📷 Scan QR</button>
    <button onclick="goToAttendance()">📊 Attendance</button>
    <button onclick="logout()">🚪 Logout</button>
  </div>

  <!-- 🔥 MAIN CONTENT -->
  <div class="main">

    <h1>Scan QR for Attendance</h1>

    <div id="reader"></div>

    <p id="status">Scan QR to mark attendance</p>

    <div id="result" class="result-card"></div>

  </div>

  <script type="module" src="student.js"></script>

</body>

</html>
