<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Student Scanner</title>

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 32px;
      font-weight: 600;
    }

    h2 {
      font-size: 20px;
      margin-top: 20px;
      margin-bottom: 10px;
    }

    #reader {
      width: 300px;
      margin: auto;
      margin-top: 20px;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    #status {
      margin-top: 15px;
      font-size: 18px;
      font-weight: 500;
      min-height: 30px;
      padding: 10px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      transition: all 0.3s ease;
    }

    .result-card {
      margin-top: 20px;
      background: white;
      color: #333;
      padding: 25px;
      border-radius: 15px;
      width: 320px;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      min-height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .result-card h3 {
      margin: 0 0 15px 0;
      color: #667eea;
      font-size: 22px;
    }

    .result-card p {
      margin: 8px 0;
      font-size: 14px;
    }
  </style>

  <!-- 🔥 QR SCANNER LIBRARY -->
  <script  src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

  <h1>Scan QR for Attendance</h1>

  <div id="reader"></div>

<h2>👤 Welcome Student</h2>
<p id="status">Scan QR to mark attendance</p>
<div id="result" class="result-card"></div>

  <script type="module" src="student.js"></script>
</body>

</html>
