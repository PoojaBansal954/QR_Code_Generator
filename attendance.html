<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Attendance Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f6f9;
      display: flex;
    }

    /* 🔵 Sidebar */
    .sidebar {
      width: 220px;
      height: 100vh;
      background: #667eea;
      padding: 20px;
      color: white;
      position: fixed;
    }

    .sidebar h2 {
      text-align: center;
      margin-bottom: 30px;
    }

    .sidebar button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      background: white;
      color: #667eea;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    .sidebar button:hover {
      background: #ddd;
    }

    /* 🔵 Content */
    .content {
      margin-left: 240px;
      width: 100%;
    }

    /* 🔝 Topbar */
    .topbar {
      height: 65px;
      background: white;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 0 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      position: relative;
    }

    /* 👤 Profile */
    .profile {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #667eea;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      cursor: pointer;
    }

    /* Dropdown */
    .dropdown {
      position: absolute;
      top: 70px;
      right: 20px;
      background: white;
      padding: 15px;
      border-radius: 10px;
      display: none;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
      width: 200px;
    }

    .dropdown p {
      margin: 5px 0;
      font-size: 14px;
    }

    .dropdown button {
      width: 100%;
      margin-top: 10px;
      padding: 8px;
      border: none;
      border-radius: 6px;
      background: red;
      color: white;
      cursor: pointer;
    }

    /* 🔵 Main */
    .main {
      padding: 30px;
      text-align: center;
    }

    h1 {
      margin-bottom: 25px;
    }

    /* 📊 Stats */
    .stats {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      padding: 18px;
      border-radius: 12px;
      width: 200px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .card h3 {
      margin-bottom: 10px;
      color: #667eea;
    }

    /* 🔍 Search */
    input {
      padding: 10px;
      margin: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      width: 250px;
    }

    button.search {
      background: #667eea;
      color: white;
      padding: 10px 15px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }

    /* 📋 Table */
    table {
      margin: auto;
      margin-top: 20px;
      border-collapse: collapse;
      width: 90%;
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
      font-size: 14px;
    }

    th {
      background: #667eea;
      color: white;
    }

    tr:hover {
      background: #f1f1f1;
    }

  </style>
</head>

<body>

  <!-- 🔵 SIDEBAR -->
  <div class="sidebar">
    <h2>Dashboard</h2>
    <button onclick="goToStudent()">🎓 Student</button>
    <button onclick="goToTeacher()">👩‍🏫 Teacher</button>
  </div>

  <!-- 🔵 CONTENT -->
  <div class="content">

    <!-- 🔝 TOPBAR -->
    <div class="topbar">
      <div class="profile" id="profileInitial" onclick="toggleProfile()">U</div>
    </div>

    <!-- 👤 DROPDOWN -->
    <div class="dropdown" id="profileDropdown">
      <p id="profileEmail"></p>
      <button onclick="logout()">Logout</button>
    </div>

    <!-- 🔵 MAIN -->
    <div class="main">

      <h1>Attendance Dashboard 📊</h1>

      <!-- 📊 STATS -->
      <div class="stats" id="statsContainer"></div>

      <!-- 🔍 SEARCH -->
      <div>
        <input type="text" id="searchEmail" placeholder="Search student email">
        <button class="search" id="searchBtn">Search</button>
      </div>

      <!-- 📋 TABLE -->
      <table>
        <thead>
         <thead>
  <tr>
    <th>Name</th>
    <th>Email</th>
    <th>Subject</th>
    <th>Duration</th>
    <th>Time</th>
    <th>Distance</th>
  </tr>
</thead>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>

    </div>

  </div>

  <!-- 🔧 JS -->
  <script type="module" src="attendance.js"></script>

  <script>
    function goToStudent() {
      window.location.href = "student.html";
    }

    function goToTeacher() {
      window.location.href = "teacher.html";
    }

    function toggleProfile() {
      const d = document.getElementById("profileDropdown");
      d.style.display =
        d.style.display === "block" ? "none" : "block";
    }
  </script>

</body>

</html>
