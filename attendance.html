<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Attendance Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      background: linear-gradient(135deg, #f5f7fa, #e4ecf7);
    }

    .container {
      width: 85%;
      margin: auto;
      margin-top: 30px;
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
      color: #333;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      margin-bottom: 30px;
    }

    .card {
      flex: 1;
      min-width: 200px;
      padding: 20px;
      border-radius: 12px;
      background: white;
      text-align: center;
      box-shadow: 0 5px 20px rgba(0,0,0,0.08);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card h3 {
      margin-bottom: 10px;
      color: #444;
    }

    .card p {
      font-size: 18px;
      font-weight: bold;
      color: #222;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 5px 20px rgba(0,0,0,0.08);
    }

    th, td {
      padding: 14px;
      text-align: center;
      border-bottom: 1px solid #eee;
    }

    th {
      background: #333;
      color: white;
      font-weight: 500;
    }

    tr:hover {
      background: #f9f9f9;
    }

    @media (max-width: 768px) {
      .container {
        width: 95%;
      }

      .card {
        min-width: 100%;
      }
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>📊 Attendance Dashboard</h1>

    <div id="statsContainer" class="stats"></div>

    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Subject</th>
          <th>Duration</th>
          <th>Time</th>
          <th>Distance</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>

  </div>

  <script type="module" src="attendance.js"></script>

</body>
</html>
